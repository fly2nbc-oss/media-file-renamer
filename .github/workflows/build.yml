name: Build

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri (Windows)
        run: npm run tauri build

      - name: Upload Windows EXE (standalone, no installer)
        uses: actions/upload-artifact@v6
        with:
          name: media-file-renamer-windows-exe
          path: src-tauri/target/release/media-file-renamer.exe

      - name: Upload Windows MSI
        uses: actions/upload-artifact@v6
        with:
          name: media-file-renamer-windows-msi
          path: src-tauri/target/release/bundle/msi/*.msi

      - name: Upload Windows NSIS
        uses: actions/upload-artifact@v6
        if: success()
        with:
          name: media-file-renamer-windows-nsis
          path: src-tauri/target/release/bundle/nsis/*.exe

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: "22"
          cache: "npm"

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies (Ubuntu)
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "src-tauri -> target"

      - name: Install dependencies
        run: npm ci

      - name: Build Tauri (Linux)
        run: npm run tauri build
        env:
          NO_STRIP: 1

      - name: Upload Linux executable (standalone, no installer)
        uses: actions/upload-artifact@v6
        with:
          name: media-file-renamer-linux-standalone
          path: src-tauri/target/release/media-file-renamer

      - name: Upload Linux AppImage
        uses: actions/upload-artifact@v6
        if: success()
        with:
          name: media-file-renamer-linux-appimage
          path: src-tauri/target/release/bundle/appimage/*.AppImage

      - name: Upload Linux deb
        uses: actions/upload-artifact@v6
        if: success()
        with:
          name: media-file-renamer-linux-deb
          path: src-tauri/target/release/bundle/deb/*.deb
